services:
  postgres:
    image: postgres:16-alpine
    container_name: trustfund-postgres
    environment:
      POSTGRES_DB: trustfund
      POSTGRES_USER: trustfund
      POSTGRES_PASSWORD: trustfund
    ports:
      - "5433:5432"
    volumes:
      - trustfund_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustfund -d trustfund"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  trustfund_pgdata:
