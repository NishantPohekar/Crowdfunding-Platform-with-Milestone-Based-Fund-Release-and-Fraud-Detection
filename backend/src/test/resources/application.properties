spring.application.name=trustfund-backend-test
spring.datasource.url=jdbc:h2:mem:trustfund;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=true
trustfund.jwt.secret=test-secret-key-for-unit-tests-min-32-chars-long
trustfund.jwt.access-token-expiration-ms=900000
trustfund.jwt.refresh-token-expiration-ms=604800000
trustfund.payment.mock-enabled=true
trustfund.frontend-url=http://localhost:5173
trustfund.mail.enabled=false
