spring.application.name=trustfund-backend
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/trustfund}
spring.datasource.username=${DB_USERNAME:trustfund}
spring.datasource.password=${DB_PASSWORD:trustfund}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

trustfund.jwt.secret=${JWT_SECRET:trustfund-dev-secret-key-change-in-production-min-32-chars}
trustfund.jwt.access-token-expiration-ms=900000
trustfund.jwt.refresh-token-expiration-ms=604800000

trustfund.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:5174
trustfund.payment.mock-enabled=true
trustfund.frontend-url=${FRONTEND_URL:http://localhost:5173}
trustfund.mail.enabled=${MAIL_ENABLED:true}
trustfund.mail.from=${SMTP_USERNAME:}
trustfund.mail.sender-name=${MAIL_SENDER_NAME:TrustFund}

spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

logging.level.com.trustfund=INFO
